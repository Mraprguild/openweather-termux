<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070B13">
        <animate attributeName="stop-color" values="#070B13;#102A43;#070B13" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#0B1726">
        <animate attributeName="stop-color" values="#0B1726;#1E3A5F;#0B1726" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#111827">
        <animate attributeName="stop-color" values="#111827;#2D1B69;#111827" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF512F"/>
      <stop offset="50%" stop-color="#F09819"/>
      <stop offset="100%" stop-color="#00C9FF"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.4 0;0.4 0;-0.4 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="0" fill="url(#bg)"/>

  <circle cx="145" cy="110" r="52" fill="#FACC15" opacity="0.95" filter="url(#glow)">
    <animate attributeName="r" values="48;58;48" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;1;0.75" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.95">
    <ellipse cx="275" cy="128" rx="74" ry="34" fill="#E5E7EB"/>
    <ellipse cx="225" cy="135" rx="55" ry="30" fill="#CBD5E1"/>
    <ellipse cx="325" cy="140" rx="62" ry="31" fill="#F8FAFC"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;28 0;0 0" dur="6s" repeatCount="indefinite"/>
  </g>

  <g stroke="#60A5FA" stroke-width="7" stroke-linecap="round" opacity="0.9">
    <line x1="235" y1="205" x2="210" y2="250">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="1.1s" repeatCount="indefinite"/>
    </line>
    <line x1="290" y1="205" x2="265" y2="250">
      <animate attributeName="opacity" values="1;0.1;1" dur="1.1s" repeatCount="indefinite"/>
    </line>
    <line x1="345" y1="205" x2="320" y2="250">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="1.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="600" y="120" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="58" font-weight="900" fill="url(#hot)" filter="url(#glow)">
    OPENWEATHER
    <animate attributeName="letter-spacing" values="2;8;2" dur="4s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="176" text-anchor="middle" font-family="monospace" font-size="28" fill="#E5E7EB">
    Termux OpenWeather CLI Project
  </text>

  <text x="600" y="226" text-anchor="middle" font-family="monospace" font-size="23" fill="#93C5FD">
    Current Weather • 5 Day Forecast • API Key Safe Config
    <animate attributeName="opacity" values="0.45;1;0.45" dur="2.8s" repeatCount="indefinite"/>
  </text>

  <rect x="252" y="275" width="696" height="74" rx="18" fill="#020617" stroke="#334155" stroke-width="2"/>
  <text x="300" y="322" font-family="monospace" font-size="26" fill="#22C55E">$ mrapweather current --city "Chennai,IN"</text>

  <text x="600" y="385" text-anchor="middle" font-family="monospace" font-size="22" fill="#F97316">
    Created by Mraprguild
  </text>
</svg>

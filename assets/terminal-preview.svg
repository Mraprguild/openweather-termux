<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <defs>
    <linearGradient id="terminalBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="980" height="520" rx="28" fill="#0F172A"/>
  <rect x="24" y="24" width="932" height="472" rx="22" fill="url(#terminalBg)" stroke="#334155" stroke-width="3"/>
  <rect x="24" y="24" width="932" height="58" rx="22" fill="#111827"/>

  <circle cx="60" cy="53" r="9" fill="#EF4444"/>
  <circle cx="92" cy="53" r="9" fill="#F59E0B"/>
  <circle cx="124" cy="53" r="9" fill="#22C55E"/>

  <text x="490" y="61" text-anchor="middle" font-family="monospace" font-size="20" fill="#CBD5E1">openweather@termux</text>

  <text x="62" y="125" font-family="monospace" font-size="22" fill="#22C55E">$ mrapweather current --city "Chennai,IN"</text>

  <g font-family="monospace" font-size="23" fill="#E5E7EB">
    <text x="62" y="176">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="62" y="216" fill="#FACC15" filter="url(#softGlow)">🌦  OPENWEATHER - CURRENT WEATHER</text>
    <text x="62" y="256">📍 Location     : Chennai, IN</text>
    <text x="62" y="296">☁️  Condition    : Scattered Clouds</text>
    <text x="62" y="336">🌡  Temperature  : 32.4°C</text>
    <text x="62" y="376">🤔 Feels Like   : 37.2°C</text>
    <text x="62" y="416">💧 Humidity     : 72%</text>
    <text x="62" y="456">💨 Wind Speed   : 4.1 m/s</text>
  </g>

  <rect x="830" y="104" width="14" height="28" fill="#22C55E">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <g opacity="0.35">
    <circle cx="850" cy="405" r="50" fill="#60A5FA">
      <animate attributeName="r" values="46;58;46" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="405" r="80" fill="none" stroke="#60A5FA" stroke-width="3">
      <animate attributeName="r" values="70;96;70" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.05;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
